# Perfil de produção (ative com SPRING_PROFILES_ACTIVE=prod).
# Todos os segredos vêm exclusivamente de variáveis de ambiente (ver .env.example).

# Schema é gerenciado pelo Flyway; o Hibernate apenas valida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Logs estruturados em JSON (ECS) — prontos para coleta por agregadores de log
logging.structured.format.console=ecs

# Health detalhado apenas para usuários autorizados; expõe somente o necessário
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=health,info,prometheus

# Desabilita a documentação interativa em produção
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
