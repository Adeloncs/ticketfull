spring.application.name=jwt-api
spring.config.import=optional:file:.env[.properties]

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jwt_api}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Pool de conexões (HikariCP)
spring.datasource.hikari.pool-name=ticketfull-pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway (schema versioning)
spring.flyway.baseline-on-migrate=true

# JWT — secret obrigatório; a aplicação falha no startup se JWT_SECRET não for fornecido
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration=7200000
api.security.token.refresh-expiration=604800000

# Limites de tamanho de requisição
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

# Bootstrap opcional de um ADMIN inicial (via env). Sem valores, nenhum admin é criado.
app.bootstrap.admin-email=${ADMIN_EMAIL:}
app.bootstrap.admin-password=${ADMIN_PASSWORD:}

# Pedidos: reserva com TTL e varredura de expiração
app.order.reservation-minutes=15
app.order.expiration-scan-ms=60000

# Gateway de pagamento ativo (fake | stripe). O adaptador 'fake' não requer credenciais.
app.payments.gateway=fake

server.port=8081

# Observabilidade (Spring Boot Actuator + Micrometer/Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.info.env.enabled=true
info.app.name=TicketFull API
info.app.description=Plataforma de venda de ingressos (Spring Boot 4 / Java 25)

# Inclui o correlationId (MDC) no padrão de log do console
logging.pattern.level=%5p [%X{correlationId:-}]