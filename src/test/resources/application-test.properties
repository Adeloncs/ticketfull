spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Tests use H2 + Hibernate-generated schema; Flyway migrations are Postgres-specific
spring.flyway.enabled=false

api.security.token.secret=test-secret-key-that-is-at-least-32-bytes-long
api.security.token.expiration=7200000
api.security.token.refresh-expiration=604800000
