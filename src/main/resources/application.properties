spring.application.name=jwt-api

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/jwt_api
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (schema versioning)
spring.flyway.baseline-on-migrate=true

# JWT
api.security.token.secret=${JWT_SECRET:my-secret-key-for-dev-only-32chars!!}
api.security.token.expiration=7200000
api.security.token.refresh-expiration=604800000

# Pedidos: reserva com TTL e varredura de expiração
app.order.reservation-minutes=15
app.order.expiration-scan-ms=60000

# Gateway de pagamento ativo (fake | stripe). O adaptador 'fake' não requer credenciais.
app.payments.gateway=fake

server.port=8081

# Observabilidade (Spring Boot Actuator + Micrometer/Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.info.env.enabled=true
info.app.name=TicketFull API
info.app.description=Plataforma de venda de ingressos (Spring Boot 4 / Java 25)

# Inclui o correlationId (MDC) no padrão de log do console
logging.pattern.level=%5p [%X{correlationId:-}]